<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forms</title>
</head>
<body>

    <div class="data" id="application">

        <header>
            <h1>Student Application Form</h1>
        </header>

        <main>
            <form id="myForm">

                <label for="name">Name:</label>
                <input type="text" id="name" name="name" placeholder="Ram Kumar">
                <br><br>

                <label for="email">Email:</label>
                <input type="email" id="email" name="email" placeholder="3200584@dse.com">
                <br><br>

                <label for="password">Password:</label>
                <input type="password" id="password" name="password" placeholder="12345">
                <br><br>

                <label for="no">Phone Number:</label>
                <input type="tel" id="no" name="phone" placeholder="9876543210">
                <br><br>

                <label>Gender:</label>

                <input type="radio" id="male" name="gender" value="Male">
                <label for="male">Male</label>

                <input type="radio" id="female" name="gender" value="Female">
                <label for="female">Female</label>

                <input type="radio" id="prefer" name="gender" value="Prefer not to say">
                <label for="prefer">Prefer not to say</label>

                <br><br>

                <label>Qualification:</label>

<input type="checkbox" class="Qualification" value="10th"> 10<sup>th</sup>
<input type="checkbox" class="Qualification" value="12th"> 12<sup>th</sup>
<input type="checkbox" class="Qualification" value="Diploma"> Diploma
<input type="checkbox" class="Qualification" value="Bachelor's"> Bachelor's
<input type="checkbox" class="Qualification" value="Master's"> Master's
<input type="checkbox" class="Qualification" value="Doctorate"> Doctorate
                <br><br>

                <label for="date">Date of Birth:</label>
                <input type="date" id="date">
                <br><br>

                <label for="color">Favorite Color:</label>
                <input type="color" id="color">
                <br><br>

                <label for="im">Upload Image:</label>
                <input type="file" id="im">
                <br><br>

                <button type="button" onclick="show()">Submit</button>

            </form>
        </main>

    </div>

    <hr>

    <div id="result"></div>

    <script src="script.js"></script>

</body>
</html>
